<VirtualHost *:8081>
    ServerName localhost
    DocumentRoot /var/www/html

    # Headers de seguridad
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Ocultar información del servidor
    ServerSignature Off

    # Cache de archivos estáticos con hash (inmutables)
    <Directory "/var/www/html/_astro">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </Directory>

    # No cachear el HTML (para que siempre pida los JS/CSS nuevos)
    <FilesMatch "\.html$">
        Header set Cache-Control "no-cache, must-revalidate"
    </FilesMatch>

    # Servir archivos estáticos de Astro
    <Directory "/var/www/html">
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks
        
        # Intentar servir archivo directamente, sino usar index.html para SPA routing
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteCond %{REQUEST_URI} !^/api/
        RewriteRule . /index.html [L]
    </Directory>
    
    # Configuración específica para la API PHP
    <Directory "/var/www/html/api">
        AllowOverride All
        Require all granted
        Options -Indexes
        
        # Ruteo para la API PHP
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^(.*)$ router.php [QSA,L]
    </Directory>
    
    # Logs
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>